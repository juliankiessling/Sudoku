<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Sudoku</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root {
            --cell-size: 48px;
            --gap: 2px;
            --fixed-bg: #e9e9e9;
            --invalid-border: #e05;
            --ok-border: #6a6;
        }
        body { font-family: system-ui, sans-serif; display:flex; gap:20px; padding:20px; }
        .board {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            gap: var(--gap);
            border: 3px solid #333;
            padding: 6px;
            background: #fff;
        }
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            box-sizing: border-box;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        .cell input {
            width:100%; height:100%; text-align:center; font-size:20px; border:1px solid #bbb;
            outline:none; appearance:none;
            background: transparent;
        }
        .cell.fixed input { background: var(--fixed-bg); font-weight:700; }
        /* thicker box borders */
        .cell.row-sep-top { border-top:3px solid #333; }
        .cell.row-sep-bottom { border-bottom:3px solid #333; }
        .cell.col-sep-left { border-left:3px solid #333; }
        .cell.col-sep-right { border-right:3px solid #333; }
        .cell.invalid input { border-color: var(--invalid-border); background: rgba(255,200,200,0.4); }
        .controls { display:flex; flex-direction:column; gap:8px; min-width:220px; }
        button { padding:8px 12px; font-size:14px; }
        .status { padding:8px; border:1px solid #ccc; min-height:40px; }
        .small { font-size:13px; color:#444; }
    </style>
</head>
<body>
    <div>
        <div class="board" id="board" aria-label="Sudoku-Brett"></div>
        <div style="margin-top:10px; display:flex; gap:8px;">
            <button id="resetBtn">Leeren</button>
            <button id="exampleBtn">Beispiel laden</button>
            <button id="validateBtn">Prüfen</button>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">Status: Bereit</div>
        <div class="small">
            Regeln: Jede Zahl 1–9 darf in jeder Zeile, Spalte und 3×3-Box nur einmal vorkommen.<br>
            Eingabe: Ziffer 1–9 oder Rückschritt/Entf.
        </div>
    </div>

    <script>
        // GitHub Copilot: kompakte Implementierung der Kernfunktionen
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const SIZE = 9;
        const fixed = Array.from({length: SIZE}, ()=>Array(SIZE).fill(false));

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r=0;r<SIZE;r++){
                for (let c=0;c<SIZE;c++){
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    // thicker separators for 3x3 boxes
                    if (r%3===0) cell.classList.add('row-sep-top');
                    if (r===SIZE-1) cell.classList.add('row-sep-bottom');
                    if (c%3===0) cell.classList.add('col-sep-left');
                    if (c===SIZE-1) cell.classList.add('col-sep-right');

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.inputMode = 'numeric';
                    input.maxLength = 1;
                    input.dataset.row = r;
                    input.dataset.col = c;
                    input.autocomplete = 'off';
                    input.spellcheck = false;

                    input.addEventListener('keydown', onKeyDown);
                    input.addEventListener('input', onInput);

                    cell.appendChild(input);
                    boardEl.appendChild(cell);
                }
            }
        }

        function onKeyDown(e){
            // Allow Digits 1-9, Backspace, Delete, Arrow keys
            if (e.key.length===1 && /[1-9]/.test(e.key)) return;
            if (['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Tab'].includes(e.key)) return;
            e.preventDefault();
        }

        function onInput(e){
            const input = e.target;
            const r = +input.dataset.row;
            const c = +input.dataset.col;
            let v = input.value.replace(/[^1-9]/g, '');
            if (v.length>1) v = v[0];
            input.value = v;

            if (fixed[r][c]) {
                // revert if attempt to change fixed cell
                input.value = input.dataset.fixedValue || '';
                return;
            }

            validateAll();
        }

        function setCell(r,c,val, isFixed=false){
            const idx = r*SIZE + c;
            const input = boardEl.children[idx].querySelector('input');
            input.value = val ? String(val) : '';
            fixed[r][c] = !!isFixed;
            if (isFixed) {
                boardEl.children[idx].classList.add('fixed');
                input.dataset.fixedValue = input.value;
            } else {
                boardEl.children[idx].classList.remove('fixed');
                delete input.dataset.fixedValue;
            }
        }

        // Prüft, ob value an (row,col) erlaubt ist (ignoriere die Zelle selbst beim Vergleich)
        function isValid(value, row, col) {
            if (!/^[1-9]$/.test(value)) return false;
            // Zeile
            for (let c=0;c<SIZE;c++){
                if (c===col) continue;
                const v = getCellValue(row,c);
                if (v === value) return false;
            }
            // Spalte
            for (let r=0;r<SIZE;r++){
                if (r===row) continue;
                const v = getCellValue(r,col);
                if (v === value) return false;
            }
            // Box
            const br = Math.floor(row/3)*3;
            const bc = Math.floor(col/3)*3;
            for (let r=br;r<br+3;r++){
                for (let c=bc;c<bc+3;c++){
                    if (r===row && c===col) continue;
                    const v = getCellValue(r,c);
                    if (v === value) return false;
                }
            }
            return true;
        }

        function getCellValue(r,c){
            const idx = r*SIZE + c;
            return boardEl.children[idx].querySelector('input').value || '';
        }

        function validateAll(){
            let anyInvalid = false;
            for (let r=0;r<SIZE;r++){
                for (let c=0;c<SIZE;c++){
                    const idx = r*SIZE + c;
                    const wrapper = boardEl.children[idx];
                    const input = wrapper.querySelector('input');
                    const v = input.value;
                    if (v && !isValid(v,r,c)) {
                        wrapper.classList.add('invalid');
                        anyInvalid = true;
                    } else {
                        wrapper.classList.remove('invalid');
                    }
                }
            }
            updateStatus();
            return !anyInvalid;
        }

        function checkComplete(){
            // Vollständig + keine Invalid-Markierungen
            for (let r=0;r<SIZE;r++){
                for (let c=0;c<SIZE;c++){
                    const v = getCellValue(r,c);
                    if (!v) return false;
                    if (!isValid(v,r,c)) return false;
                }
            }
            return true;
        }

        function updateStatus(){
            if (checkComplete()) {
                statusEl.textContent = 'Status: Sudoku vollständig und korrekt gelöst ✅';
            } else {
                // check if any invalid
                const anyInvalid = [...boardEl.children].some(w => w.classList.contains('invalid'));
                if (anyInvalid) statusEl.textContent = 'Status: Regelverletzungen vorhanden ✖';
                else statusEl.textContent = 'Status: Ungelöst — keine offensichtlichen Regelverletzungen';
            }
        }

        function clearBoard(){
            for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) setCell(r,c,'',false);
            validateAll();
        }

        // Beispiel-Puzzle (0 = leer)
        const example = [
            [5,3,0, 0,7,0, 0,0,0],
            [6,0,0, 1,9,5, 0,0,0],
            [0,9,8, 0,0,0, 0,6,0],

            [8,0,0, 0,6,0, 0,0,3],
            [4,0,0, 8,0,3, 0,0,1],
            [7,0,0, 0,2,0, 0,0,6],

            [0,6,0, 0,0,0, 2,8,0],
            [0,0,0, 4,1,9, 0,0,5],
            [0,0,0, 0,8,0, 0,7,9]
        ];

        function loadExample(puz){
            clearBoard();
            for (let r=0;r<SIZE;r++){
                for (let c=0;c<SIZE;c++){
                    const v = puz[r][c];
                    if (v) setCell(r,c,v,true);
                }
            }
            validateAll();
        }

        // Buttons
        document.getElementById('resetBtn').addEventListener('click', ()=>{ clearBoard(); statusEl.textContent='Status: Leeres Brett'; });
        document.getElementById('exampleBtn').addEventListener('click', ()=>{ loadExample(example); statusEl.textContent='Status: Beispiel geladen'; });
        document.getElementById('validateBtn').addEventListener('click', ()=>{ const ok = validateAll(); statusEl.textContent = ok ? 'Prüfung: Keine Regelverletzungen gefunden' : 'Prüfung: Regelverletzungen vorhanden'; });

        // Initialize
        createBoard();
        clearBoard();
    </script>
</body>
</html>
